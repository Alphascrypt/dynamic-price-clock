<!DOCTYPE html><html><head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Dynamic Price Clock - Tablet-Modus</title>
<script>(function(){try{var qp=new URLSearchParams(location.search).get('theme');if(qp==='dark'||(!qp&&localStorage.getItem('theme')==='dark')){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
<link rel='stylesheet' href='style.css'>
<style>
html,body{height:100%;overflow:hidden}
body{padding:0!important;display:flex;align-items:center;justify-content:center}
.kiosk-wrap{width:min(820px,94vw);max-height:100vh;padding:clamp(8px,2.2vh,20px);box-sizing:border-box;text-align:center;overflow:hidden}
.kiosk-clock{margin-bottom:clamp(4px,1.6vh,16px)}
.kiosk-time{font-size:clamp(20px,5.5vh,48px);font-weight:800;line-height:1.1;letter-spacing:1px}
.kiosk-date{font-size:clamp(10px,1.8vh,16px);color:var(--muted);margin-top:2px;text-transform:capitalize}
.kiosk-gauge{max-width:min(420px,50vh,90vw);margin:0 auto}
.kiosk-gauge svg{width:100%;max-width:100%;height:auto;background:transparent;border:0;margin:0}
.kiosk-status{display:inline-block;font-size:clamp(14px,3vh,26px);font-weight:800;margin:clamp(2px,1vh,6px) 0 clamp(4px,1.4vh,14px);padding:clamp(4px,0.9vh,8px) clamp(10px,3vw,22px);border-radius:999px;background:var(--overlay-faint)}
.kiosk-chart{margin-top:clamp(6px,1.8vh,18px);max-width:min(100%,64vh);margin-left:auto;margin-right:auto;position:relative;touch-action:none;cursor:crosshair}
.kiosk-chart svg{width:100%;height:auto;display:block}
.kiosk-crosshair-line{stroke:var(--text);stroke-width:1.5;stroke-dasharray:4,4;opacity:0;pointer-events:none}
.kiosk-crosshair-dot{fill:var(--text);stroke:#0b1224;stroke-width:2;opacity:0;pointer-events:none}
.kiosk-tooltip{position:absolute;transform:translate(-50%,-115%);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;box-shadow:0 8px 20px var(--shadow-soft)}
.kiosk-meta{color:var(--muted);font-size:clamp(10px,1.7vh,15px);margin-top:clamp(4px,1.6vh,16px);display:flex;flex-wrap:wrap;gap:clamp(3px,0.8vh,6px) clamp(8px,2vw,18px);justify-content:center}
.kiosk-exit{position:fixed;top:14px;right:14px;opacity:.3;transition:opacity .2s var(--ease)}
.kiosk-exit:hover{opacity:1}
.kiosk-hint{font-size:clamp(9px,1.3vh,12px);color:var(--muted);margin-top:clamp(4px,1vh,22px);max-width:520px;margin-left:auto;margin-right:auto}
.kiosk-chart-hint{color:var(--muted);margin-top:6px}
.actions{margin-top:clamp(6px,2vh,20px)!important;justify-content:center!important}
@media (orientation:landscape) and (max-height:820px){
.kiosk-wrap{width:min(1120px,97vw);padding:clamp(6px,2vh,14px) clamp(10px,3vw,22px)}
.kiosk-columns{display:flex;align-items:center;gap:clamp(10px,3vw,28px);text-align:left}
.kiosk-col-left{flex:0 0 clamp(160px,24vw,300px);text-align:center}
.kiosk-col-right{flex:1;min-width:0}
.kiosk-clock{margin-bottom:clamp(2px,1vh,10px)}
.kiosk-time{font-size:clamp(16px,4.2vh,32px)}
.kiosk-date{font-size:clamp(9px,1.5vh,12px)}
.kiosk-gauge{max-width:min(100%,40vh)}
.kiosk-status{margin:clamp(4px,1vh,8px) 0 0;font-size:clamp(13px,2.6vh,26px)}
.kiosk-chart{margin-top:0;max-width:min(100%,150vh)}
.kiosk-meta{justify-content:flex-start;margin-top:clamp(4px,1vh,10px);font-size:clamp(10px,1.5vh,13px)}
.kiosk-chart-hint{text-align:left}
.actions{justify-content:flex-start!important;margin-top:clamp(4px,1.2vh,12px)!important}
.kiosk-hint{margin-top:clamp(2px,0.8vh,8px);max-width:100%;margin-left:0;margin-right:0}
}
</style>
</head><body>

<a class='kiosk-exit' href='#'><button class='secondary' type='button'>Dashboard</button></a>

</div>
<div class='kiosk-status' style='color:#4ade80'>Günstig</div>
</div>

<line x1='55' y1='195' x2='740' y2='195' stroke='#9aa8c7' stroke-width='1.2' stroke-dasharray='5,5'/><text x='620' y='189' fill='#9aa8c7' font-size='11'>Schnitt 27 ct</text>
<polyline fill='none' stroke='#60a5fa' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' points='55,265 55,210 120,225 200,235 300,255 400,235 500,180 600,120 700,150 740,265'/>
<line x1='420' y1='25' x2='420' y2='265' stroke='#3a4a72' stroke-width='1.4' stroke-dasharray='3,4'/><text x='426' y='39' fill='#7184ad' font-size='11'>Morgen</text>
<line x1='300' y1='25' x2='300' y2='265' stroke='#facc15' stroke-width='1.6' stroke-dasharray='2,3'/><circle cx='300' cy='255' r='5' fill='#facc15'/><text x='308' y='247' fill='#facc15' font-size='13' font-weight='700'>18 ct 12:00</text>
<line class='kiosk-crosshair-line' x1='600' x2='600' y1='25' y2='265' style='opacity:1'/><circle class='kiosk-crosshair-dot' cx='600' cy='120' r='6' style='opacity:1'/>
</svg>
<div class='kiosk-tooltip' style='left:600px;top:120px;opacity:1'>39 ct · 20:00</div>
</div>
<p class='small kiosk-chart-hint'>Mit Finger oder Maus über das Diagramm fahren, um Preise zu sehen.</p>

<div class='kiosk-meta'>

</body></html>

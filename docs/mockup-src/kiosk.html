<!DOCTYPE html><html><head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Dynamic Price Clock - Tablet-Modus</title>
<script>(function(){try{var qp=new URLSearchParams(location.search).get('theme');if(qp==='dark'||(!qp&&localStorage.getItem('theme')==='dark')){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
<link rel='stylesheet' href='style.css'>
<style>
html,body{height:100%;overflow:hidden}
body{padding:0!important;display:flex;align-items:center;justify-content:center}
.kiosk-wrap{display:flex;flex-direction:column;align-items:center;max-height:100vh;padding:clamp(8px,2.2vh,20px);box-sizing:border-box;text-align:center;overflow:hidden}
.kiosk-canvas{position:relative;height:min(92vh,calc(97vw * 16 / 9));width:min(97vw,calc(92vh * 9 / 16));aspect-ratio:9/16;flex:0 0 auto}
.kw{position:absolute;overflow:hidden;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center}
.kiosk-time{font-size:clamp(18px,5vh,46px);font-weight:800;line-height:1.1;letter-spacing:1px}
.kiosk-date{font-size:clamp(9px,1.7vh,15px);color:var(--muted);margin-top:2px;text-transform:capitalize}
.kw-gauge svg{width:100%;height:100%;background:transparent;border:0;margin:0}
.kiosk-live-power{font-size:clamp(11px,1.9vh,16px);font-weight:700;color:var(--muted)}
.kiosk-live-power:empty{display:none}
.kiosk-status{font-size:clamp(13px,2.8vh,25px);font-weight:800;padding:clamp(4px,0.9vh,8px) clamp(10px,3vw,22px);border-radius:999px;background:var(--overlay-faint)}
.kw-chart{touch-action:none;cursor:crosshair}
.kiosk-chart{position:relative;flex:1;min-height:0;width:100%}
.kiosk-chart svg{width:100%;height:100%;display:block}
.kiosk-crosshair-line{stroke:var(--text);stroke-width:1.5;stroke-dasharray:4,4;opacity:0;pointer-events:none}
.kiosk-crosshair-dot{fill:var(--text);stroke:#0b1224;stroke-width:2;opacity:0;pointer-events:none}
.kiosk-tooltip{position:absolute;transform:translate(-50%,-115%);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;box-shadow:0 8px 20px var(--shadow-soft)}
.kiosk-chart-hint{color:var(--muted);font-size:clamp(9px,1.3vh,12px);margin:clamp(10px,2vh,20px) 0 0;flex:0 0 auto}
.kiosk-meta{color:var(--muted);font-size:clamp(9px,1.6vh,14px);display:flex;flex-wrap:wrap;gap:clamp(3px,0.8vh,6px) clamp(8px,2vw,18px);justify-content:center;align-items:center;height:100%}
.kiosk-meta span:empty{display:none}
.kiosk-exit{position:fixed;top:14px;right:14px;opacity:.3;transition:opacity .2s var(--ease)}
.kiosk-exit:hover{opacity:1}
.kiosk-hint{font-size:clamp(9px,1.3vh,12px);color:var(--muted);margin-top:clamp(4px,1vh,14px);max-width:520px}
.actions{margin-top:clamp(6px,2vh,16px)!important;justify-content:center!important}
.kw-clock{left:10.00%;top:2.00%;width:80.00%;height:9.00%}
.kw-gauge{left:10.00%;top:13.00%;width:80.00%;height:32.00%}
.kw-status{left:20.00%;top:47.00%;width:60.00%;height:7.00%}
.kw-livepower{left:20.00%;top:55.00%;width:60.00%;height:5.00%}
.kw-chart{left:3.00%;top:62.00%;width:94.00%;height:28.00%}
.kw-meta{left:3.00%;top:92.00%;width:94.00%;height:7.00%}
@media (orientation:landscape){
.kiosk-canvas{height:min(92vh,calc(97vw * 9 / 16));width:min(97vw,calc(92vh * 16 / 9));aspect-ratio:16/9}
.kiosk-time{font-size:clamp(14px,4vh,30px)}
.kiosk-date{font-size:clamp(8px,1.4vh,12px)}
.kiosk-status{font-size:clamp(12px,2.4vh,22px)}
.kiosk-live-power{font-size:clamp(10px,1.6vh,14px)}
.kiosk-meta{font-size:clamp(8px,1.4vh,12px)}
.kw-clock{left:20.00%;top:2.00%;width:60.00%;height:10.00%}
.kw-gauge{left:3.00%;top:14.00%;width:34.00%;height:55.00%}
.kw-status{left:3.00%;top:71.00%;width:34.00%;height:10.00%}
.kw-livepower{left:3.00%;top:82.00%;width:34.00%;height:8.00%}
.kw-chart{left:40.00%;top:14.00%;width:57.00%;height:65.00%}
.kw-meta{left:40.00%;top:81.00%;width:57.00%;height:15.00%}
}
</style>
</head><body>

<line x1='55' y1='195' x2='740' y2='195' stroke='#9aa8c7' stroke-width='1.2' stroke-dasharray='5,5'/><text x='620' y='189' fill='#9aa8c7' font-size='11'>Schnitt 27 ct</text>
<polyline fill='none' stroke='#60a5fa' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' points='55,265 55,210 120,225 200,235 300,255 400,235 500,180 600,120 700,150 740,265'/>
